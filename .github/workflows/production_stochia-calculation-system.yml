name: Build and deploy Python project to Azure Function App - stochia-calculation-system

on:
  push:
    branches:
      - production
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.11'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python version
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies into package folder
        run: |
          pip install -r requirements.txt --target=".python_packages/lib/site-packages"

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_F7C666E25E8D4F778D2C4CFE01AEE96A }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_6BEA81E86FC349ACB71BD3C7FA728D6E }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_5AE723846C564A0F99144DE28739ACAF }}

      - name: 'Deploy to Azure Functions'
        uses: Azure/functions-action@v1
        with:
          app-name: 'stochia-calculation-system'
          slot-name: 'Production'
          package: '.'
          scm-do-build-during-deployment: false
          enable-oryx-build: false
